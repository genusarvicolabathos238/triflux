<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="380">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="light-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="deep-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#db6d28"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c0956c"/>
    </linearGradient>
    <linearGradient id="codex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#3b78e7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="12" fill="url(#bg)"/>
  <rect width="800" height="380" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="16" font-weight="bold">Deep vs Light Modes</text>
  <text x="400" y="48" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="11">Every domain offers both — choose speed or depth</text>

  <!-- ===== Center divider ===== -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="356" text-anchor="middle" fill="#484f58" font-family="SF Mono,Consolas,monospace" font-size="8">vs</text>

  <!-- ============================================ -->
  <!-- LEFT: LIGHT MODE                             -->
  <!-- ============================================ -->

  <!-- Light header -->
  <rect x="130" y="62" width="140" height="28" rx="14" fill="#3fb950" opacity="0.15" stroke="#3fb950" stroke-width="1"/>
  <text x="200" y="81" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="13" font-weight="bold">Light Mode</text>

  <!-- Light subtitle -->
  <text x="200" y="105" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Single CLI  ·  Fast  ·  Token-Efficient</text>

  <!-- Request box -->
  <rect x="140" y="120" width="120" height="28" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="0.8"/>
  <text x="200" y="138" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="10">Request</text>

  <!-- Arrow down -->
  <line x1="200" y1="148" x2="200" y2="165" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="194,162 200,170 206,162" fill="#3fb950"/>

  <!-- Single CLI: Codex -->
  <rect x="128" y="172" width="144" height="52" rx="8" fill="#0d1f17" stroke="#10a37f" stroke-width="1.5"/>
  <circle cx="150" cy="192" r="7" fill="url(#codex)"/>
  <text x="168" y="196" fill="#10a37f" font-family="SF Mono,Consolas,monospace" font-size="11" font-weight="bold">Codex CLI</text>
  <text x="140" y="214" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Single-model execution</text>

  <!-- Arrow down -->
  <line x1="200" y1="224" x2="200" y2="242" stroke="#3fb950" stroke-width="2"/>
  <polygon points="194,239 200,248 206,239" fill="#3fb950"/>

  <!-- Direct Output -->
  <rect x="140" y="250" width="120" height="28" rx="6" fill="#0d1f17" stroke="#238636" stroke-width="1.5"/>
  <text x="200" y="268" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">Direct Output</text>

  <!-- Light metrics -->
  <rect x="52" y="296" width="72" height="32" rx="6" fill="#3fb950" opacity="0.08" stroke="#3fb950" stroke-width="0.5"/>
  <text x="88" y="310" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">3-15K</text>
  <text x="88" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">tokens</text>

  <rect x="134" y="296" width="72" height="32" rx="6" fill="#3fb950" opacity="0.08" stroke="#3fb950" stroke-width="0.5"/>
  <text x="170" y="310" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Seconds</text>
  <text x="170" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">speed</text>

  <rect x="216" y="296" width="72" height="32" rx="6" fill="#3fb950" opacity="0.08" stroke="#3fb950" stroke-width="0.5"/>
  <text x="252" y="310" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Good</text>
  <text x="252" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">accuracy</text>

  <rect x="298" y="296" width="82" height="32" rx="6" fill="#3fb950" opacity="0.08" stroke="#3fb950" stroke-width="0.5"/>
  <text x="339" y="310" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Possible</text>
  <text x="339" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">bias</text>

  <!-- Use when -->
  <text x="200" y="350" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Quick tasks, known patterns, iteration</text>

  <!-- ============================================ -->
  <!-- RIGHT: DEEP MODE                             -->
  <!-- ============================================ -->

  <!-- Deep header -->
  <rect x="530" y="62" width="140" height="28" rx="14" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="1"/>
  <text x="600" y="81" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="13" font-weight="bold">Deep Mode</text>

  <!-- Deep subtitle -->
  <text x="600" y="105" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Tri-CLI  ·  Thorough  ·  Consensus-Verified</text>

  <!-- Request box -->
  <rect x="540" y="120" width="120" height="28" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="0.8"/>
  <text x="600" y="138" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="10">Request</text>

  <!-- Three parallel arrows down (fan out) -->
  <line x1="560" y1="148" x2="510" y2="172" stroke="#d4a574" stroke-width="1.2"/>
  <line x1="600" y1="148" x2="600" y2="172" stroke="#10a37f" stroke-width="1.2"/>
  <line x1="640" y1="148" x2="690" y2="172" stroke="#4285f4" stroke-width="1.2"/>

  <!-- Three CLI boxes -->
  <!-- Claude -->
  <rect x="460" y="172" width="76" height="42" rx="5" fill="#1c1917" stroke="#d4a574" stroke-width="1"/>
  <circle cx="476" cy="188" r="5" fill="url(#claude)"/>
  <text x="488" y="192" fill="#d4a574" font-family="SF Mono,Consolas,monospace" font-size="8" font-weight="bold">Claude</text>
  <text x="468" y="206" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">Arch</text>

  <!-- Codex -->
  <rect x="562" y="172" width="76" height="42" rx="5" fill="#0d1f17" stroke="#10a37f" stroke-width="1"/>
  <circle cx="578" cy="188" r="5" fill="url(#codex)"/>
  <text x="590" y="192" fill="#10a37f" font-family="SF Mono,Consolas,monospace" font-size="8" font-weight="bold">Codex</text>
  <text x="570" y="206" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">Sec/Perf</text>

  <!-- Gemini -->
  <rect x="664" y="172" width="76" height="42" rx="5" fill="#0d1520" stroke="#4285f4" stroke-width="1"/>
  <circle cx="680" cy="188" r="5" fill="url(#gemini)"/>
  <text x="692" y="192" fill="#4285f4" font-family="SF Mono,Consolas,monospace" font-size="8" font-weight="bold">Gemini</text>
  <text x="672" y="206" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">UX/Docs</text>

  <!-- ISOLATED badges -->
  <rect x="475" y="163" width="42" height="12" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="496" y="172" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="6" font-weight="bold">ISOLATED</text>
  <rect x="579" y="163" width="42" height="12" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="600" y="172" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="6" font-weight="bold">ISOLATED</text>
  <rect x="679" y="163" width="42" height="12" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="700" y="172" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="6" font-weight="bold">ISOLATED</text>

  <!-- Merge arrows (fan in) -->
  <line x1="498" y1="214" x2="560" y2="233" stroke="#d4a574" stroke-width="1" stroke-dasharray="3"/>
  <line x1="600" y1="214" x2="600" y2="233" stroke="#10a37f" stroke-width="1" stroke-dasharray="3"/>
  <line x1="702" y1="214" x2="640" y2="233" stroke="#4285f4" stroke-width="1" stroke-dasharray="3"/>

  <!-- Cross-Validation bar -->
  <rect x="540" y="233" width="120" height="18" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="600" y="245" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Cross-Validate</text>

  <!-- Arrow to gate -->
  <line x1="600" y1="251" x2="600" y2="260" stroke="#f0883e" stroke-width="1.5"/>

  <!-- Consensus Gate diamond -->
  <polygon points="600,261 625,275 600,289 575,275" fill="#1c1510" stroke="#f0883e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="600" y="279" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="8" font-weight="bold">&#8805;70%</text>

  <!-- Verified Output -->
  <line x1="625" y1="275" x2="660" y2="275" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="662" y="263" width="88" height="24" rx="5" fill="#0d1f17" stroke="#238636" stroke-width="1.2"/>
  <text x="706" y="279" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">VERIFIED</text>

  <!-- Retry loop -->
  <line x1="575" y1="275" x2="455" y2="275" stroke="#f85149" stroke-width="0.8" stroke-dasharray="3"/>
  <path d="M455,275 L445,275 L445,195 L460,195" stroke="#f85149" stroke-width="0.8" stroke-dasharray="3" fill="none"/>
  <text x="442" y="240" fill="#f85149" font-family="SF Mono,Consolas,monospace" font-size="6" transform="rotate(-90,442,240)">RETRY</text>

  <!-- Deep metrics -->
  <rect x="452" y="296" width="72" height="32" rx="6" fill="#f0883e" opacity="0.08" stroke="#f0883e" stroke-width="0.5"/>
  <text x="488" y="310" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">20-80K</text>
  <text x="488" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">tokens</text>

  <rect x="534" y="296" width="72" height="32" rx="6" fill="#f0883e" opacity="0.08" stroke="#f0883e" stroke-width="0.5"/>
  <text x="570" y="310" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Minutes</text>
  <text x="570" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">speed</text>

  <rect x="616" y="296" width="72" height="32" rx="6" fill="#f0883e" opacity="0.08" stroke="#f0883e" stroke-width="0.5"/>
  <text x="652" y="310" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Excellent</text>
  <text x="652" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">accuracy</text>

  <rect x="698" y="296" width="82" height="32" rx="6" fill="#f0883e" opacity="0.08" stroke="#f0883e" stroke-width="0.5"/>
  <text x="739" y="310" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">Eliminated</text>
  <text x="739" y="322" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">bias</text>

  <!-- Use when -->
  <text x="600" y="350" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Critical decisions, unknown territory, production</text>

  <!-- ===== Footer ===== -->
  <text x="400" y="373" text-anchor="middle" fill="#484f58" font-family="SF Mono,Consolas,monospace" font-size="8">triflux v8.4 — Choose the right mode for every task</text>
</svg>